spring.application.name=AdityaBirlaGroup-Textile
server.port=8080

#MySQL DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/abg_textile?createDatabaseIfNotExist=true
spring.datasource.username=raja
spring.datasource.password=raja


#Why Not Just Write mysql://...?
#Because Java standard database API is JDBC, so URL starts with:
#jdbc:
#
#Different DB examples:
#jdbc:mysql://...
#jdbc:postgresql://...
#jdbc:oracle:thin:@...
#jdbc:h2:mem:testdb



#Spring Data JPA does not replace JDBC. It abstracts SQL and entity mapping, but internally Hibernate uses JDBC and a DataSource to communicate with the database.
#JPA/HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect




#You write:      materialRepository.save(material);
#JPA -> Hibernate -> DataSource -> JDBC -> MySQL
